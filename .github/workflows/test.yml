# 【自動テスト(CI)】push のたびに純粋ロジックのテストを実行し、壊れたら知らせます。
# tests/test_logic.py は標準ライブラリのassertだけで動く軽量テスト(ネット接続なし)。

name: テスト

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: パッケージをインストール
        run: pip install -r requirements.txt

      - name: ロジックテストを実行
        run: python tests/test_logic.py
